hide_news: true
hide_mathjax: true
load_admin: true
---
<div class="page-header">
  <h1 class="page-header__title">Admin Login</h1>
</div>
<div id="login-page" style="max-width: 480px; margin: 2em 0;">
  <div id="login-form">
    <p>Enter your GitHub Personal Access Token to enable editing. The token needs <code>repo</code> scope.</p>
    <input type="password" id="cmsTokenInput" class="cms-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" style="width: 100%; padding: 0.6em; font-size: 1em; margin-bottom: 0.5em;" />
    <div id="cmsLoginError" class="cms-error" style="display:none; color: #c00; margin-bottom: 0.5em;">Invalid token or insufficient permissions.</div>
    <button id="cmsLoginSubmit" class="cms-btn cms-btn--primary">Login</button>
  </div>
  <div id="login-status" style="display:none;">
    <p>You are logged in.</p>
    <button id="cmsLogoutBtn" class="cms-btn cms-btn--secondary">Logout</button>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var form = document.getElementById('login-form');
  var status = document.getElementById('login-status');

  if (window.CMS.isAdmin) {
    form.style.display = 'none';
    status.style.display = 'block';
    document.getElementById('cmsLogoutBtn').addEventListener('click', function() {
      window.CMS.logout();
    });
    return;
  }

  var input = document.getElementById('cmsTokenInput');
  var errorEl = document.getElementById('cmsLoginError');
  var submitBtn = document.getElementById('cmsLoginSubmit');

  function doLogin() {
    var token = input.value.trim();
    if (!token) {
      errorEl.textContent = 'Please enter a token.';
      errorEl.style.display = 'block';
      return;
    }
    submitBtn.disabled = true;
    submitBtn.textContent = 'Verifying...';
    errorEl.style.display = 'none';

    window.CMS.login(token).then(function(success) {
      if (!success) {
        errorEl.textContent = 'Invalid token or insufficient permissions.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    }).catch(function() {
      errorEl.textContent = 'Connection error. Please try again.';
      errorEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Login';
    });
  }

  submitBtn.addEventListener('click', doLogin);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  input.focus();
});
</script>
