<meta charset="utf-8">
<!-- begin SEO -->
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
<meta property="og:locale" content="{{ site.locale }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
{% if page.description %}<meta property="og:description" content="{{ page.description }}">{% endif %}
<script type="application/ld+json">
  { "@context" : "http://schema.org", "@type" : "Person", "name" : "{{ site.author.name }}", "url" : "{{ site.url }}", "sameAs" : null }
</script>
<!-- end SEO -->
<link href="/feed.xml" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">
<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>
{% include analytics.html %}
<!-- For all browsers -->
<link rel="stylesheet" href="/assets/css/main.css">
<meta http-equiv="cleartype" content="on">
